name: mo_gallery_mobile
description: MO Gallery mobile upload client (Android-first).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  crypto: ^3.0.6
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  uuid: ^4.5.1
  collection: ^1.18.0
  flutter_foreground_task: ^8.17.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  http_mock_adapter: ^0.6.1
  sqflite_common_ffi: ^2.3.4

flutter:
  uses-material-design: true
